name: Playwright Mobility Framework CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:14-3.2
        env:
          POSTGRES_DB: geofencing_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "npm"

      - name: Install global tools
        run: npm install -g wait-on allure-commandline

      - name: Install dependencies
        run: npm install

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: Initialize Database
        run: PGPASSWORD=${{ secrets.DB_PASSWORD }} psql -h localhost -U postgres -d geofencing_db -f src/db/schema.sql

      - name: Run Playwright tests
        run: |
          npm start &
          wait-on http://localhost:4000
          npx playwright test
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: geofencing_db
          DB_USER: postgres
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          API_KEY: ${{ secrets.API_KEY }}
          API_BASE_URL: http://localhost:4000/api/v1
          VEHICLE_SIMULATOR_URL: http://localhost:9090

      - name: Setup Java
        if: always()
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Generate Allure Report
        if: always()
        run: allure generate allure-results --clean -o allure-report

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-alexandria
          path: allure-report/
          retention-days: 7

      - name: Slack/Discord Notification
        if: always()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_TITLE: "Dr. Basem, Alexandria Suite Result"
          SLACK_MESSAGE: "Pipeline for Alexandria Port finished with status: ${{ job.status }} ✅"
